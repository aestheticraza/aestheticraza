<svg width="900" height="240" viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0d1420"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>
    <filter id="blurA" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="35"/>
    </filter>
    <filter id="blurB" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
  </defs>

  <rect width="900" height="240" rx="16" fill="url(#bg)"/>

  <circle cx="760" cy="50" r="90" fill="#3b82f6" opacity="0.35" filter="url(#blurA)"/>
  <circle cx="840" cy="190" r="70" fill="#34d399" opacity="0.28" filter="url(#blurB)"/>
  <circle cx="120" cy="210" r="60" fill="#818cf8" opacity="0.18" filter="url(#blurA)"/>

  <rect x="36" y="36" width="560" height="168" rx="18" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>

  <text x="64" y="94" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">
    Ali Raza
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze"/>
  </text>

  <text x="64" y="126" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="19" font-weight="600" fill="url(#accent)">
    Laravel Architect — SaaS &amp; ERP Systems
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.3s" fill="freeze"/>
  </text>

  <text x="64" y="158" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" fill="#94a3b8">
    Turning real business workflows into software —
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.6s" fill="freeze"/>
  </text>
  <text x="64" y="180" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" fill="#94a3b8">
    hotels, retail, manufacturing, and field-service companies.
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.6s" fill="freeze"/>
  </text>

  <rect x="64" y="196" width="140" height="3" rx="1.5" fill="url(#accent)">
    <animate attributeName="width" values="0;140" dur="0.8s" begin="0.9s" fill="freeze"/>
  </rect>
</svg>
